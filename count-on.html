<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infinite BigInt Counter</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#090909;
    color:white;
    font-family:Arial,sans-serif;
}

header{
    position:sticky;
    top:0;
    padding:18px;
    text-align:center;
    background:#181818;
    font-size:30px;
    font-weight:bold;
    box-shadow:0 3px 15px rgba(0,0,0,.5);
}

#stats{
    text-align:center;
    padding:10px;
    color:#bbb;
}

#numbers{
    max-width:900px;
    margin:auto;
    padding-bottom:100px;
}

.number{
    padding:12px;
    font-size:30px;
    text-align:center;
    border-bottom:1px solid #222;
    word-break:break-all;
}

.number:hover{
    background:#1d1d1d;
}
</style>
</head>
<body>

<header>
∞ BigInt Counter
</header>

<div id="stats">
Current: <span id="current">0</span>
</div>

<div id="numbers"></div>

<script>
let current = 1n;

const container = document.getElementById("numbers");
const currentLabel = document.getElementById("current");

function updateCurrent(){
    currentLabel.textContent = current.toString();
}

function addBatch(amount){

    const fragment = document.createDocumentFragment();

    for(let i=0;i<amount;i++){

        const div = document.createElement("div");

        div.className = "number";

        div.textContent = current.toString();

        fragment.appendChild(div);

        current++;

    }

    container.appendChild(fragment);

    updateCurrent();

}

// Initial numbers
addBatch(1000);

// Infinite loading
window.addEventListener("scroll",()=>{

    if(window.innerHeight + window.scrollY >
       document.body.offsetHeight - 1200){

        addBatch(1000);

    }

});
</script>

</body>
</html>
